name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Runs: check-markdown-docs + npm test (vitest) + test:e2e (docker).
      # All CI logic lives in the `ci` package.json script — this step is the
      # only place in the YAML that needs to change when checks are added.
      #
      # Note: release.yml (distributed by @datalackey/typescript-build-config)
      # also runs `npm test` as a fast pre-publish gate. That overlap is
      # intentional: release.yml is canonical and cannot be modified to call
      # `npm run ci` without causing permanent postinstall drift warnings.
      # The vitest suite runs twice on a push to main — once here (~1 s) and
      # once in the release job — which is an acceptable trade-off for keeping
      # the plugin workflow unmodified.
      - name: Full CI check
        run: npm run ci
